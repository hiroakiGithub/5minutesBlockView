<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5分ブロックビュー</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --line: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --done: #475569;
    --future: #1e293b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .wrap { width: 100%; max-width: 640px; }
  h1 { font-size: 20px; margin: 0 0 16px; font-weight: 600; }
  .clock { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
  .clock b { color: var(--text); font-variant-numeric: tabular-nums; }

  .hero {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .hero .label { color: var(--muted); font-size: 14px; }
  .hero .big {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    margin: 4px 0;
    font-variant-numeric: tabular-nums;
  }
  .hero .big .total { color: var(--muted); font-size: 32px; }
  .hero .big .accent { color: var(--accent); }
  .hero .range {
    color: var(--muted);
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .hero .status { margin-top: 10px; font-size: 14px; color: var(--accent); }

  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
  }
  .cell {
    flex: 0 0 auto;
    width: 38px;
    background: var(--future);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 2px;
    text-align: center;
  }
  .cell.done { background: var(--done); color: var(--muted); }
  .cell.now {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f172a;
    font-weight: 700;
  }
  .cell .n { font-size: 12px; font-weight: 700; line-height: 1.2; }
  .cell .t { font-size: 8px; opacity: .7; }

  .settings {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px 20px;
  }
  .settings .row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .settings label { width: 80px; color: var(--muted); font-size: 14px; }
  .settings input[type="time"] {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 16px;
    font-family: inherit;
  }
  .settings .hint { color: var(--muted); font-size: 12px; margin: 0; }
  .err { color: #f87171; font-size: 13px; margin: 4px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>5分ブロックビュー</h1>
  <div class="clock">現在時刻：<b id="now">--:--:--</b></div>

  <div class="hero">
    <div class="label">現在のブロック</div>
    <div class="big"><span class="accent" id="curBlock">-</span><span class="total" id="totalBlock"> / -</span></div>
    <div class="range" id="curRange">--:-- 〜 --:--</div>
    <div class="status" id="status"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="settings">
    <div class="row">
      <label for="start">開始時刻</label>
      <input type="time" id="start" value="09:00">
    </div>
    <div class="row">
      <label for="end">終了時刻</label>
      <input type="time" id="end" value="18:00">
    </div>
    <div class="row">
      <label for="breakOn" style="width:auto"><input type="checkbox" id="breakOn"> 休憩</label>
      <input type="time" id="breakStart" value="12:00">
      <span style="color:var(--muted)">〜</span>
      <input type="time" id="breakEnd" value="13:00">
    </div>
    <p class="hint">時刻を入力すると自動で反映されます（スタートボタンは不要）。毎時0分から5分刻みでブロックを区切り、最初の端数も1ブロック目として数えます。休憩時間中はブロックを作らず、休憩明けから次のブロックが始まります。</p>
    <p class="err" id="err"></p>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const startEl = $("start"), endEl = $("end"), errEl = $("err");
  const breakOnEl = $("breakOn"), breakStartEl = $("breakStart"), breakEndEl = $("breakEnd");

  // 設定の保存・復元
  const saved = JSON.parse(localStorage.getItem("blockView") || "{}");
  if (saved.start) startEl.value = saved.start;
  if (saved.end) endEl.value = saved.end;
  if (saved.breakOn) breakOnEl.checked = saved.breakOn;
  if (saved.breakStart) breakStartEl.value = saved.breakStart;
  if (saved.breakEnd) breakEndEl.value = saved.breakEnd;

  function saveSettings() {
    localStorage.setItem("blockView", JSON.stringify({
      start: startEl.value, end: endEl.value,
      breakOn: breakOnEl.checked, breakStart: breakStartEl.value, breakEnd: breakEndEl.value
    }));
  }
  [startEl, endEl, breakOnEl, breakStartEl, breakEndEl].forEach(el =>
    el.addEventListener("change", () => { saveSettings(); render(); }));

  // "HH:MM" -> 分（その日の通算分）
  function toMin(str) {
    const [h, m] = str.split(":").map(Number);
    return h * 60 + m;
  }
  // 分 -> "H:MM"
  function fmt(min) {
    const m = ((min % 1440) + 1440) % 1440;
    const h = Math.floor(m / 60), mm = m % 60;
    return h + ":" + String(mm).padStart(2, "0");
  }

  // 1区間を5分刻みグリッドに合わせてブロック化（最初の端数も1ブロック目）
  function segmentBlocks(s, e) {
    const bounds = [s];
    let b = Math.floor(s / 5) * 5 + 5; // 開始直後の最初のグリッド境界
    while (b < e) { bounds.push(b); b += 5; }
    bounds.push(e);
    const blocks = [];
    for (let i = 0; i < bounds.length - 1; i++) blocks.push({ start: bounds[i], end: bounds[i + 1] });
    return blocks;
  }

  // 休憩を挟んで全ブロックを生成（休憩中はブロックを作らない）
  function buildBlocks(start, end) {
    let bs = null, be = null;
    if (breakOnEl.checked) {
      bs = toMin(breakStartEl.value);
      be = toMin(breakEndEl.value);
      if (be <= bs || be <= start || bs >= end) { bs = null; be = null; } // 無効・範囲外は無視
      else { bs = Math.max(bs, start); be = Math.min(be, end); }
    }
    const segments = (bs !== null) ? [[start, bs], [be, end]] : [[start, end]];
    let blocks = [];
    for (const [s, e] of segments) if (s < e) blocks = blocks.concat(segmentBlocks(s, e));
    return { blocks, breakStart: bs, breakEnd: be };
  }

  function render() {
    const start = toMin(startEl.value);
    const end = toMin(endEl.value);

    if (end <= start) {
      errEl.textContent = "終了時刻は開始時刻より後に設定してください。";
      $("grid").innerHTML = "";
      $("curBlock").textContent = "-";
      $("totalBlock").textContent = " / -";
      $("curRange").textContent = "--:-- 〜 --:--";
      $("status").textContent = "";
      return;
    }
    errEl.textContent = "";

    const { blocks, breakStart, breakEnd } = buildBlocks(start, end);
    const total = blocks.length;

    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

    // 現在のブロック番号（1始まり）。どのブロックにも当たらなければ0。
    let cur = 0;
    for (let i = 0; i < total; i++) {
      if (nowMin >= blocks[i].start && nowMin < blocks[i].end) { cur = i + 1; break; }
    }

    $("totalBlock").textContent = " / " + total;

    const inBreak = breakStart !== null && nowMin >= breakStart && nowMin < breakEnd;

    if (nowMin < start) {
      $("curBlock").textContent = "-";
      $("curRange").textContent = fmt(start) + " 〜 " + fmt(end);
      $("status").textContent = "開始前です（あと " + Math.ceil(start - nowMin) + " 分）";
    } else if (nowMin >= end) {
      $("curBlock").textContent = "終";
      $("curRange").textContent = fmt(start) + " 〜 " + fmt(end);
      $("status").textContent = "終了しました";
    } else if (inBreak) {
      $("curBlock").textContent = "休";
      $("curRange").textContent = fmt(breakStart) + " 〜 " + fmt(breakEnd);
      $("status").textContent = "休憩中（あと 約" + Math.ceil(breakEnd - nowMin) + " 分）";
    } else if (cur) {
      $("curBlock").textContent = cur;
      $("curRange").textContent = fmt(blocks[cur - 1].start) + " 〜 " + fmt(blocks[cur - 1].end);
      const remain = Math.ceil(blocks[cur - 1].end - nowMin);
      $("status").textContent = "このブロックの残り 約" + remain + " 分";
    } else {
      $("curBlock").textContent = "-";
      $("curRange").textContent = fmt(start) + " 〜 " + fmt(end);
      $("status").textContent = "";
    }

    // グリッド描画
    const grid = $("grid");
    grid.innerHTML = "";
    for (let i = 0; i < total; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      if (cur && i + 1 === cur) cell.classList.add("now");
      else if (blocks[i].end <= nowMin) cell.classList.add("done");
      cell.title = fmt(blocks[i].start) + "〜" + fmt(blocks[i].end);
      cell.innerHTML = '<div class="n">' + (i + 1) + '</div>' +
                       '<div class="t">' + fmt(blocks[i].start) + '</div>';
      grid.appendChild(cell);
    }
  }

  function tick() {
    const now = new Date();
    $("now").textContent =
      String(now.getHours()).padStart(2, "0") + ":" +
      String(now.getMinutes()).padStart(2, "0") + ":" +
      String(now.getSeconds()).padStart(2, "0");
    render();
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
